# BlueMQ API Server Configuration
# Replace 'bluemq.yourdomain.com' with your actual domain

# Upstream for BlueMQ API
upstream bluemq_api {
    server bluemq:3001;
    keepalive 32;
}

# HTTP → HTTPS redirect
server {
    listen 80;
    listen [::]:80;
    server_name bluemq.yourdomain.com;

    # Let's Encrypt ACME challenge
    location /.well-known/acme-challenge/ {
        root /var/www/certbot;
    }

    # Redirect all other traffic to HTTPS
    location / {
        return 301 https://$host$request_uri;
    }
}

# HTTPS server
server {
    listen 443 ssl http2;
    listen [::]:443 ssl http2;
    server_name bluemq.yourdomain.com;

    # SSL certificates (managed by Certbot)
    ssl_certificate /etc/letsencrypt/live/bluemq.yourdomain.com/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/bluemq.yourdomain.com/privkey.pem;

    # SSL configuration
    ssl_session_timeout 1d;
    ssl_session_cache shared:SSL:50m;
    ssl_session_tickets off;

    # Modern SSL configuration
    ssl_protocols TLSv1.2 TLSv1.3;
    ssl_ciphers ECDHE-ECDSA-AES128-GCM-SHA256:ECDHE-RSA-AES128-GCM-SHA256:ECDHE-ECDSA-AES256-GCM-SHA384:ECDHE-RSA-AES256-GCM-SHA384:ECDHE-ECDSA-CHACHA20-POLY1305:ECDHE-RSA-CHACHA20-POLY1305:DHE-RSA-AES128-GCM-SHA256:DHE-RSA-AES256-GCM-SHA384;
    ssl_prefer_server_ciphers off;

    # HSTS (1 year)
    add_header Strict-Transport-Security "max-age=31536000; includeSubDomains" always;

    # Request size limits
    client_max_body_size 10M;
    client_body_buffer_size 128k;

    # Connection limit
    limit_conn addr 100;

    # ─────────────────────────────────────────────────────────────
    # Health check (no rate limit)
    # ─────────────────────────────────────────────────────────────
    location /health {
        proxy_pass http://bluemq_api;
        proxy_http_version 1.1;
        proxy_set_header Connection "";
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    # ─────────────────────────────────────────────────────────────
    # Notify endpoint (higher rate limit)
    # ─────────────────────────────────────────────────────────────
    location /notify {
        limit_req zone=notify burst=100 nodelay;
        
        proxy_pass http://bluemq_api;
        proxy_http_version 1.1;
        proxy_set_header Connection "";
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_read_timeout 60s;
        proxy_connect_timeout 10s;
    }

    # ─────────────────────────────────────────────────────────────
    # WhatsApp webhook (no rate limit - WAHA calls this)
    # ─────────────────────────────────────────────────────────────
    location /whatsapp/sessions/webhook {
        proxy_pass http://bluemq_api;
        proxy_http_version 1.1;
        proxy_set_header Connection "";
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    # ─────────────────────────────────────────────────────────────
    # All other API endpoints (standard rate limit)
    # ─────────────────────────────────────────────────────────────
    location / {
        limit_req zone=api burst=20 nodelay;

        proxy_pass http://bluemq_api;
        proxy_http_version 1.1;
        proxy_set_header Connection "";
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_read_timeout 300s;
        proxy_connect_timeout 10s;
        proxy_buffering off;
    }

    # ─────────────────────────────────────────────────────────────
    # Error pages
    # ─────────────────────────────────────────────────────────────
    error_page 502 503 504 /50x.json;
    location = /50x.json {
        default_type application/json;
        return 503 '{"error": "Service temporarily unavailable", "retry_after": 30}';
    }

    error_page 429 /429.json;
    location = /429.json {
        default_type application/json;
        return 429 '{"error": "Too many requests", "retry_after": 60}';
    }
}
