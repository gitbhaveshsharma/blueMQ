services:
  waha:
    image: devlikeapro/waha
    container_name: bluemq-waha
    ports:
      - "3000:3000"
    environment:
      # API key — must match WAHA_API_KEY in BlueMQ's .env
      - WHATSAPP_API_KEY=${WHATSAPP_API_KEY:-${WAHA_API_KEY:-}}
      # Webhook URL — BlueMQ will receive session status updates here
      # Keep a safe absolute fallback so WAHA never receives a relative URL.
      # Prefer WHATSAPP_HOOK_URL if explicitly provided.
      # Else build from WAHA_HOOK_BASE_URL (or host.docker.internal for local Docker).
      - WHATSAPP_HOOK_URL=${WHATSAPP_HOOK_URL:-${WAHA_HOOK_BASE_URL:-http://host.docker.internal:3001}/whatsapp/sessions/webhook?secret=${WAHA_WEBHOOK_SECRET:-dev-webhook-secret}}
      - WHATSAPP_HOOK_EVENTS=session.status
      # WhatsApp engine — WEBJS is more stable
      - WHATSAPP_DEFAULT_ENGINE=WEBJS
      - WAHA_LOG_LEVEL=info
    volumes:
      - waha_sessions:/app/.sessions
    restart: unless-stopped
    healthcheck:
      test:
        [
          "CMD-SHELL",
          'curl -fsS -H "X-Api-Key: $$WHATSAPP_API_KEY" http://localhost:3000/api/server/status >/dev/null || exit 1',
        ]
      interval: 30s
      timeout: 10s
      retries: 3

volumes:
  waha_sessions:
    driver: local
