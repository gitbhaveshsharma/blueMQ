version: "3.9"
services:
  waha:
    image: devlikeapro/waha
    container_name: bluemq-waha
    ports:
      - "3000:3000"
    environment:
      # API key — must match WAHA_API_KEY in BlueMQ's .env
      - WHATSAPP_API_KEY=${WAHA_API_KEY:-${WHATSAPP_API_KEY}}
      # Webhook URL — BlueMQ will receive session status updates here
      - WHATSAPP_HOOK_URL=${WHATSAPP_HOOK_URL:-${BASE_URL}/whatsapp/sessions/webhook?secret=${WAHA_WEBHOOK_SECRET}}
      - WHATSAPP_HOOK_EVENTS=session.status
      # WhatsApp engine — WEBJS is more stable
      - WHATSAPP_DEFAULT_ENGINE=WEBJS
      - WAHA_LOG_LEVEL=info
    volumes:
      - waha_sessions:/app/.sessions
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:3000/api/server/status"]
      interval: 30s
      timeout: 10s
      retries: 3

volumes:
  waha_sessions:
    driver: local
