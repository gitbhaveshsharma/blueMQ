version: "3.9"
services:
  waha:
    image: devlikeapro/waha
    container_name: bluemq-waha
    ports:
      - "3000:3000"
    environment:
      - WHATSAPP_API_KEY=${WHATSAPP_API_KEY}
      - WHATSAPP_HOOK_URL=${WHATSAPP_HOOK_URL}
      - WHATSAPP_HOOK_EVENTS=session.status
      - WHATSAPP_DEFAULT_ENGINE=WEBJS
      - WAHA_LOG_LEVEL=info
    volumes:
      - waha_sessions:/app/.sessions
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:3000/api/server/status"]
      interval: 30s
      timeout: 10s
      retries: 3

volumes:
  waha_sessions:
    driver: local
